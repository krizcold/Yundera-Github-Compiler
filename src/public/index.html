<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Yundera Dev Kit</title>
    <!-- Theme manager: loads before CSS to prevent FOUC -->
    <script src="/public/js/theme.js"></script>
    <!-- External CSS -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="/public/css/variables.css">
    <link rel="stylesheet" href="/public/css/base.css">
    <link rel="stylesheet" href="/public/css/components.css">
    <link rel="stylesheet" href="/public/css/layout.css">
    <link rel="stylesheet" href="/public/css/panels.css">
    <link rel="stylesheet" href="/public/css/dialogs.css">
    <link rel="stylesheet" href="/public/css/themes.css">
    <!-- CDN dependencies -->
    <script src="https://cdn.jsdelivr.net/npm/axios/dist/axios.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/js-yaml/4.1.0/js-yaml.min.js"></script>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>
                <img src="https://cdn.statically.io/gh/krizcold/Yundera-Dev-Kit/main/YunderaCompiler.png" alt="Yundera Dev Kit" style="height: 1.2em; vertical-align: middle;">
                Yundera Dev Kit
            </h1>
            <p>Manage and deploy GitHub repositories automatically to CasaOS</p>
        </div>

        <div class="controls">
            <div style="display: flex; gap: 15px; align-items: center;">
                <!-- Add Repository button removed - now using direct URL input in repository list -->
                <button class="btn btn-secondary" id="check-updates-btn">
                    <i class="fas fa-sync-alt"></i>
                    Check Updates
                </button>
                <button class="btn btn-secondary" id="terminal-btn">
                    <i class="fas fa-terminal"></i>
                    Terminal
                </button>
                <button class="btn btn-secondary" id="logs-btn">
                    <i class="fas fa-file-alt"></i>
                    Service Logs
                </button>
            </div>

            <div style="display: flex; gap: 15px; align-items: center;">
                <button class="btn btn-secondary" id="settings-btn">
                    <i class="fas fa-cog"></i>
                    Settings
                </button>
                <div style="font-size: 12px; color: var(--gray-600);">
                    API Updates: <span id="api-status" class="status-enabled">Enabled</span>
                </div>
            </div>
        </div>

        <div class="repo-list" id="repo-list">
            <!-- Repositories will be loaded dynamically -->
        </div>
    </div>

    <!-- URL Expand Modal -->
    <div class="modal" id="url-modal">
        <div class="modal-content" style="width: 600px;">
            <div class="modal-header">
                <h3>Repository URL</h3>
                <button class="close-btn" onclick="closeModal('url-modal')">&times;</button>
            </div>
            <div class="modal-body">
                <textarea id="url-textarea" placeholder="Enter the full GitHub repository URL..."></textarea>
            </div>
            <div class="modal-footer">
                <button class="btn btn-secondary" onclick="closeModal('url-modal')">Cancel</button>
                <button class="btn btn-primary" onclick="saveUrl()">Save</button>
            </div>
        </div>
    </div>

    <!-- YAML Editor Modal -->
    <div class="modal" id="yaml-modal">
        <div class="modal-content" style="width: 800px;">
            <div class="modal-header">
                <h3>Docker Compose YAML</h3>
                <button class="close-btn" onclick="closeModal('yaml-modal')">&times;</button>
            </div>
            <div class="modal-body">
                <textarea id="yaml-textarea" placeholder="Docker Compose YAML will appear here..."></textarea>
            </div>
            <div class="modal-footer">
                <button class="btn btn-secondary" onclick="closeModal('yaml-modal')">Cancel</button>
                <button class="btn btn-primary" onclick="saveYaml()">Save</button>
            </div>
        </div>
    </div>

    <!-- Settings Modal -->
    <div class="modal" id="settings-modal">
        <div class="modal-content" style="width: 500px;">
            <div class="modal-header">
                <h3>Global Settings</h3>
                <button class="close-btn" onclick="closeModal('settings-modal')">&times;</button>
            </div>
            <div class="modal-body">
                <div style="display: flex; flex-direction: column; gap: 20px;">
                    <div class="setting-row">
                        <label for="global-api-updates">Enable API Update Requests:</label>
                        <input type="checkbox" id="global-api-updates">
                    </div>
                    <div class="setting-row">
                        <label for="max-builds">Max Concurrent Builds:</label>
                        <input type="number" id="max-builds" min="1" max="10" value="2">
                    </div>
                    <hr>
                    <h4>App Store Processing</h4>
                    <div class="setting-row">
                        <label for="puid">PUID:</label>
                        <input type="text" id="puid" value="1000">
                    </div>
                    <div class="setting-row">
                        <label for="pgid">PGID:</label>
                        <input type="text" id="pgid" value="1000">
                    </div>
                    <div class="setting-row">
                        <label for="ref-domain">Gateway Domain:</label>
                        <input type="text" id="ref-domain" value="local.casaos.io">
                    </div>
                </div>
            </div>
            <div class="modal-footer">
                <button class="btn btn-secondary" onclick="closeModal('settings-modal')">Cancel</button>
                <button class="btn btn-primary" id="save-settings-btn">Save Settings</button>
            </div>
        </div>
    </div>

    <!-- URL Change Warning Modal -->
    <div class="modal" id="url-warning-modal">
        <div class="modal-content" style="width: 600px;">
            <div class="modal-header">
                <h3><i class="fas fa-exclamation-triangle" style="color: var(--warning-color);"></i> URL Change Warning</h3>
                <button class="close-btn" onclick="repoManager.cancelUrlChange()">&times;</button>
            </div>
            <div class="modal-body">
                <div id="url-warning-content" style="display: flex; flex-direction: column; gap: 15px;">
                    <div style="padding: 12px; background-color: #fef3c7; border-left: 4px solid var(--warning-color); border-radius: 4px;">
                        <strong>⚠️ Warning:</strong>
                        <p id="url-warning-message" style="margin: 8px 0 0 0; color: var(--gray-700);"></p>
                    </div>
                    <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 15px;">
                        <div>
                            <strong>Current URL:</strong>
                            <p id="url-current" style="margin: 4px 0; color: var(--gray-600); word-break: break-all; font-size: 13px; font-family: monospace;"></p>
                        </div>
                        <div>
                            <strong>New URL:</strong>
                            <p id="url-new" style="margin: 4px 0; color: var(--gray-600); word-break: break-all; font-size: 13px; font-family: monospace;"></p>
                        </div>
                    </div>
                    <div style="padding: 12px; background-color: var(--gray-100); border-radius: 4px;">
                        <p style="margin: 0; color: var(--gray-700); font-size: 14px;">
                            Do you want to proceed with this URL change?
                        </p>
                    </div>
                </div>
            </div>
            <div class="modal-footer">
                <button class="btn btn-secondary" onclick="repoManager.cancelUrlChange()">
                    <i class="fas fa-times"></i> Cancel
                </button>
                <button class="btn btn-warning" onclick="repoManager.confirmUrlChange()">
                    <i class="fas fa-check"></i> Confirm Change
                </button>
            </div>
        </div>
    </div>



    <!-- Build Info Display -->
    <div class="build-info" id="build-info">
        <div><span class="build-info-version">v<span id="build-version">...</span></span> <span class="build-info-type" id="build-type">...</span></div>
        <div><span id="build-sha">...</span> • <span id="build-date">...</span></div>
    </div>

    <!-- Application scripts (order matters: utils → repo-manager → build-system → panels → main) -->
    <script src="/public/js/utils.js"></script>
    <script src="/public/js/repo-manager.js"></script>
    <script src="/public/js/build-system.js"></script>
    <script src="/public/js/panels.js"></script>
    <script src="/public/js/main.js"></script>
</body>
</html>
